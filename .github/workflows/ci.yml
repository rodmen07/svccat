name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4.1.7

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2.7.3

      - name: Build
        run: cargo build --all-targets

      - name: Run tests
        run: cargo test

  lint-and-drift:
    name: Lint, Drift & Benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4.1.7
        with:
          fetch-depth: 0

      - name: Install Rust (stable + clippy + rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2.7.3

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (deny warnings)
        run: cargo clippy -- -D warnings

      - name: Build svccat (local release)
        run: cargo build --release

      - name: Run svccat self-check on sample monorepo
        run: >
          ./target/release/svccat
          --root examples/sample-monorepo
          check --fail-on-drift

      # ── Catalog Drift PR checks ──────────────────────────────────────────────
      - name: Annotate new drift (inline PR annotations)
        if: github.event_name == 'pull_request'
        run: |
          ./target/release/svccat check \
            --since origin/${{ github.base_ref }} \
            --format github-annotation \
            || true

      - name: Generate drift report
        if: github.event_name == 'pull_request'
        id: drift
        run: |
          {
            echo 'output<<SVCCAT_EOF'
            ./target/release/svccat check \
              --since origin/${{ github.base_ref }} \
              --format markdown \
              || true
            echo 'SVCCAT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post PR comment with drift report
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7.0.1
        with:
          script: |
            const output = `${{ steps.drift.outputs.output }}`;
            const marker = '<!-- svccat-drift-comment -->';
            const body = marker + '\n' + output;

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

      - name: Fail on new drift
        if: github.event_name == 'pull_request'
        run: |
          ./target/release/svccat check \
            --since origin/${{ github.base_ref }} \
            --fail-on-new-drift

      # ── Performance Benchmarks & Binary Size ────────────────────────────────
      - name: Run benchmarks
        run: cargo bench --bench benchmark -- --output-format bencher | tee output.txt

      - name: Check binary size
        run: |
          SIZE=$(stat -f%z target/release/svccat 2>/dev/null || stat -c%s target/release/svccat)
          echo "Binary size: $((SIZE / 1024 / 1024)) MB"

      - name: Store benchmark results
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'cargo'
          output-file-path: output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true

      - name: Comment on PR with benchmark results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7.0.1
        with:
          script: |
            let comment = '## 📊 Performance Benchmarks\n\n';
            comment += 'Benchmarks completed successfully.\n\n';
            comment += 'Run locally with: `cargo bench`\n';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment,
            });

  security-and-coverage:
    name: Security & Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.1.7

      # Pre-built audit-check - runs in ~5 seconds (no cargo install cargo-audit compilation)
      - name: Security audit
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Only run tarpaulin nightly on push to main (to completely hide codecov run latency from developers' PR checks)
      - name: Install Rust (nightly for coverage)
        if: github.ref == 'refs/heads/main'
        uses: dtolnay/rust-toolchain@nightly

      - name: Run cargo tarpaulin (coverage)
        if: github.ref == 'refs/heads/main'
        uses: actions-rs/tarpaulin@v0.1
        with:
          args: '--out Xml --timeout 300'

      - name: Upload coverage to codecov.io
        if: github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v4
        with:
          files: ./cobertura.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
