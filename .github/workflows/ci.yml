name: Continuous Integration & Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-verify:
    name: Verify Registry Deployment
    # This loops through 3 OS platforms × 3 Rust toolchains = 9 independent runners
    strategy:
      fail-fast: false # Ensures one failing job doesn't cancel the other 8 downloads
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable, beta, nightly]

    runs-on: ${{ matrix.os }}

    steps:
      # 1. Bring down the repo code to let the runner know what to execute
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Dynamically provision the specific matrix toolchain channel
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      # 3. FORCE NETWORK HIT FROM CRATES.IO
      # This completely bypasses any local targets and pulls directly from the public registry.
      # Using --force ensures the runner downloads the crate assets on every single run.
      - name: Install Latest Release From Registry
        run: cargo install svccat --force --no-track

      # 4. Optional: Run your verification test suite against the installed binary
      - name: Verify CLI Execution
        run: svccat --version

  build-and-test:
    name: Build & Test (This Checkout)
    # Distinct from "Verify Registry Deployment" above. That job answers "does
    # the already-published crates.io release still install and run on this
    # OS/toolchain?" — a valid smoke test, left unchanged. This job answers a
    # different question: "does THIS PR's own code compile and pass its tests?"
    # which the registry job structurally cannot, since `cargo install
    # svccat` always fetches the published release, never this checkout.
    #
    # Scope: one runner per OS on stable only (not the full 3x3 matrix above).
    # `coverage.yml` already builds and tests this checkout on ubuntu/nightly,
    # so stable-per-OS here adds the two OSes with zero real-code coverage
    # today (windows, macos) plus an ubuntu/stable leg, without doubling this
    # job count to a second 9-way matrix. beta/nightly stay exclusively on the
    # registry smoke test above; if that channel coverage is ever wanted for
    # this checkout too, that is a follow-up, not folded in here.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build output
        uses: Swatinem/rust-cache@v2.7.3

      # Full build, not just `cargo check`: this repo's real defects to date
      # (PR #6/#7 XSS, PR #8 silent stdout regression) were caught by tests,
      # not by the compiler, so `cargo test` is the tier that actually gates.
      - name: Build this checkout (all features)
        run: cargo build --all-features --verbose

      - name: Test this checkout (all features)
        run: cargo test --all-features --verbose

  audit:
    name: Security audit
    # svccat is published to crates.io, so a vulnerable transitive dependency
    # is a supply-chain concern for downstream users. This job scans the
    # committed Cargo.lock — the exact pinned versions that ship — on every PR.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Run security audit
        # --deny warnings promotes unsound/unmaintained/yanked advisories to
        # failures instead of letting them accumulate silently (cargo audit
        # exits 0 on those by default). Clean at time of adding (213 deps, no
        # findings); the gate exists so a future advisory fails CI rather than
        # riding along invisibly.
        run: cargo audit --deny warnings
