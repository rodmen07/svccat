name: Production Release & Validation

on:
  push:
    tags:
      - 'v*' # Triggers instantly when a semver release tag is pushed

jobs:
  crates-publish:
    name: Publish to Crates.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish Package
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}

  post-publish-matrix:
    name: Post-Publish Registry Validation
    needs: crates-publish # Waits completely for the package to be live on Crates.io
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Install Stable Rust
        uses: dtolnay/rust-toolchain@stable

      # Give Crates.io global CDN nodes a moment to index the fresh version
      - name: Await Registry CDN Sync
        run: sleep 45
        shell: bash

      # FORCE INITIAL LIVE HIT
      # Instantly tests the fresh release live over the internet across all OS variants
      - name: Force Install Live Version
        run: cargo install svccat --force --no-track

      - name: Verify Live Binary Execution
        run: svccat --version

