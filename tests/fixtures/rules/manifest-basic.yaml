version: "1"

discovery:
  paths: ["services/*"]

policy:
  require_fields: ["language", "platform"]

  rules:
    - id: naming_convention
      description: "Services must match pattern service-*"
      expression: "name matches ^service-[a-z0-9-]+$"
      severity: error

    - id: required_team
      description: "Services must have a team assigned"
      expression: "team exists"
      severity: error

    - id: approved_platforms
      description: "Only approved deployment platforms allowed"
      expression: "platform in [Cloud Run, GKE, Heroku]"
      severity: warning

services:
  - name: service-api
    language: Rust
    platform: Cloud Run
    role: Core API
    team: platform

  - name: service-web
    language: TypeScript
    platform: Cloud Run
    role: Web Frontend
    team: frontend

  - name: invalid-service
    language: Python
    platform: Lambda
    role: Background Worker
    team: ~

  - name: service-auth
    language: Rust
    platform: GKE
    role: Authentication Service
    team: ~
